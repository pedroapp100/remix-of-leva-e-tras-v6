<!doctype html>
<html lang="pt-BR" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sem conexão — Leva e Traz</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: system-ui, -apple-system, sans-serif;
        background: #0f172a;
        color: #f1f5f9;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
      }

      .card {
        text-align: center;
        max-width: 360px;
        width: 100%;
      }

      .icon {
        font-size: 4rem;
        margin-bottom: 1.5rem;
        display: block;
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 0.75rem;
        color: #f8fafc;
      }

      p {
        font-size: 0.95rem;
        color: #94a3b8;
        line-height: 1.6;
        margin-bottom: 2rem;
      }

      button {
        background: #3b82f6;
        color: #fff;
        border: none;
        padding: 0.75rem 2rem;
        border-radius: 0.5rem;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
        width: 100%;
      }

      button:hover { background: #2563eb; }
      button:active { background: #1d4ed8; }
    </style>
  </head>
  <body>
    <div class="card">
      <span class="icon">📡</span>
      <h1>Você está offline</h1>
      <p>
        Verifique sua conexão com a internet e tente novamente.
        Suas últimas telas podem estar disponíveis em cache.
      </p>
      <button onclick="location.reload()">Tentar novamente</button>
    </div>
  </body>
</html>
